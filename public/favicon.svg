<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle top sheen -->
  <rect width="32" height="14" rx="7" fill="white" opacity="0.06"/>

  <!-- Bar 1 (shortest, left) -->
  <rect x="5" y="21" width="5.5" height="7" rx="1.5" fill="url(#bar1)"/>

  <!-- Bar 2 (medium, center) -->
  <rect x="13.5" y="15" width="5.5" height="13" rx="1.5" fill="url(#bar2)"/>

  <!-- Bar 3 (tallest, right) -->
  <rect x="22" y="8" width="5.5" height="20" rx="1.5" fill="url(#bar3)"/>

  <!-- Trend line -->
  <polyline
    points="7.75,20  16.25,14  24.75,7"
    stroke="#818cf8"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Glowing dot at peak -->
  <circle cx="24.75" cy="7" r="2.2" fill="white" filter="url(#glow)" opacity="0.95"/>
  <circle cx="24.75" cy="7" r="1.2" fill="#818cf8"/>
</svg>
